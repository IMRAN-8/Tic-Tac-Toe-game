<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <header class="header">
        <h1>Tic Tac Toe</h1>
      </header>

      <section class="scoreboard" aria-label="Scoreboard">
        <div class="score active" id="scoreX">
          <span>Player X</span>
          <strong>0</strong>
        </div>
        <div class="score" id="scoreDraw">
          <span>Draws</span>
          <strong>0</strong>
        </div>
        <div class="score" id="scoreO">
          <span>Player O</span>
          <strong>0</strong>
        </div>
      </section>

      <div class="status" id="status" role="status" aria-live="polite">Player X's turn</div>

      <section class="board" id="board" aria-label="Tic Tac Toe board">
        <button class="cell" data-index="0" aria-label="Cell 1"></button>
        <button class="cell" data-index="1" aria-label="Cell 2"></button>
        <button class="cell" data-index="2" aria-label="Cell 3"></button>
        <button class="cell" data-index="3" aria-label="Cell 4"></button>
        <button class="cell" data-index="4" aria-label="Cell 5"></button>
        <button class="cell" data-index="5" aria-label="Cell 6"></button>
        <button class="cell" data-index="6" aria-label="Cell 7"></button>
        <button class="cell" data-index="7" aria-label="Cell 8"></button>
        <button class="cell" data-index="8" aria-label="Cell 9"></button>
      </section>

      <div class="actions">
        <button class="btn primary" id="newRoundBtn">New Round</button>
        <button class="btn secondary" id="resetScoreBtn">Reset Score</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
